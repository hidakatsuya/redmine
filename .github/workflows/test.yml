name: Test

on:
  push:
    branches:
      - "dev/**"
  workflow_dispatch:

jobs:
  sqlite3:
    name: SQLite3 + Ruby${{ matrix.ruby }}

    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.3", "3.2"]

    steps:
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bzr git mercurial subversion cvs \
            ghostscript \
            gsfonts \
            imagemagick libmagick++-dev

          sudo sed -ri 's/(rights)="none" (pattern="PDF")/\1="read" \2/' /etc/ImageMagick-6/policy.xml;

      - uses: browser-actions/setup-chrome@v1
      - run: chrome --version

      - uses: actions/checkout@v4

      - run: |
          cat <<EOS > config/database.yml
          development:
            adapter: sqlite3
            database: db/development.sqlite3
          test:
            adapter: sqlite3
            database: db/test<%= ENV['TEST_ENV_NUMBER'] %>.sqlite3
          EOS

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Prepare db/schema.rb
        run: bin/rails db:migrate
        env:
          RAILS_ENV: development

      - run: bin/rails parallel:setup
        env:
          RAILS_ENV: test

      - run: bin/rails parallel:test['test\/(?!system)']
      - run: bin/rails parallel:test[system]
        env:
          GOOGLE_CHROME_OPTS_ARGS: "headless,disable-gpu,no-sandbox,disable-dev-shm-usage"
