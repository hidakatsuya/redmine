name: Tests with PostgreSQL

on:
  push:

jobs:
  tests:
    name: test postgres ruby-${{ matrix.ruby }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.1", "3.2", "3.3"]
      fail-fast: false

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: redmine_test
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare test database
        run: |
          cat > config/database.yml <<EOF
          test:
            adapter: postgresql
            database: redmine_test
            username: root
            password: root
            host: 127.0.0.1
          EOF

      - name: Run tests
        uses: ./.github/actions/tests
        with:
          ruby: ${{ matrix.ruby }}
