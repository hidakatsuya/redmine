name: Tests with SQLite3

on:
  push:

jobs:
  tests:
    name: test sqlite3 ruby-${{ matrix.ruby }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ["3.1", "3.2", "3.3"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare test database
        run: |
          cat > config/database.yml <<EOF
          test:
            adapter: sqlite3
            database: db/test.sqlite3
          EOF

      - name: Run tests
        uses: ./.github/actions/tests
        with:
          ruby: ${{ matrix.ruby }}
